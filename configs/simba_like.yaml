experiment:
  mode: simba

data:
  input_size: 448
  local_patch_size: 80
  heatmap_sigma_ratio: 0.04
  heatmap_sigma_min: 8.0
  global_crop_margin_ratio: 0.04

model:
  target_mode: relative
  metadata:
    mode: simba_hybrid

training:
  optimizer: adam
  lr: 0.0001
  weight_decay: 0.00001
  scheduler: plateau
  warmup_epochs: 0
  min_lr: 0.00001
  loss: l1
  batch_size: 8
  val_batch_size: 8
  test_batch_size: 8
  gradient_accumulation_steps: 2
  workers_override: 4
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  eval_interval: 1

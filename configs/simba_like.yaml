experiment:
  name: rhpe_boneage_simba_like
  mode: simba
  seed: 2026

runtime:
  allow_cpu_fallback: false
  channels_last: true

data:
  input_size: 384
  heatmap_sigma_ratio: 0.035
  heatmap_sigma_min: 8.0
  global_crop_mode: bbox
  global_crop_margin_ratio: 0.08
  normalization:
    source: auto_train_stats
    stats_path: train_mean_std.json
    mean: null
    std: null

model:
  ensemble_mode: resnet
  pretrained: false
  branch_mode: global_only
  target_mode: relative
  relative_target_direction: boneage_minus_chronological
  global_dim: 256
  cbam:
    enabled: false
    global_branch: false
    local_branch: false
  metadata:
    enabled: true
    mode: simba_multiplier
    use_gender: true
    use_chronological: true
  heatmap_guidance:
    enabled: true
  head:
    hidden_dim: 256
    dropout: 0.25

augmentation:
  affine_p: 0.65
  rotation_limit: 10
  translate_limit: 0.04
  scale_limit: 0.1
  shear_limit: 3
  horizontal_flip: false
  horizontal_flip_p: 0.5
  use_noise: false
  use_blur: false

training:
  epochs: 150
  batch_size: 8
  val_batch_size: 8
  test_batch_size: 8
  optimizer: adamw
  lr: 0.00025
  weight_decay: 0.0005
  scheduler: cosine
  scheduler_factor: 0.5
  scheduler_patience: 2
  warmup_epochs: 3
  min_lr: 5.0e-6
  loss: smoothl1
  amp: true
  gradient_clip: 1.0
  compile: true
  compile_mode: reduce-overhead
  best_metric: mae
  log_interval: 30
  eval_interval: 1
  save_interval: 1
  early_stopping_patience: 16
  early_stopping_min_delta: 0.01
  workers_override: 2
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
